<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="description" content="Gestão de despesas por CNPJ" />
  <title>Despesa Fácil</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
</head>
<body>
  <div id="app"></div>
  <div class="toast" id="toast"></div>
  <!-- Banner PWA: Android/Chrome (beforeinstallprompt) -->
  <div id="pwa-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;padding:14px 16px 20px;background:#1a1d27;border-top:1px solid rgba(99,102,241,0.25);box-shadow:0 -4px 24px rgba(0,0,0,0.4);align-items:center;gap:12px;">
    <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#7c3aed);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
      <svg width="22" height="22" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>
    </div>
    <div style="flex:1;min-width:0;">
      <div style="font-weight:700;font-size:0.9rem;color:#e8eaf0;">Adicionar à tela inicial</div>
      <div style="font-size:0.75rem;color:#8b8fa8;margin-top:1px;">Use como um app nativo, sem abrir o navegador</div>
    </div>
    <button id="pwa-install-btn" style="padding:8px 16px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#7c3aed);color:white;border:none;font-weight:700;font-size:0.85rem;cursor:pointer;flex-shrink:0;">Instalar</button>
    <button id="pwa-dismiss-btn" style="padding:8px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.08);color:#8b8fa8;cursor:pointer;flex-shrink:0;">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <!-- Banner PWA: iOS/Safari (sem suporte a beforeinstallprompt) -->
  <div id="pwa-ios-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:9999;padding:16px 16px 28px;background:#1a1d27;border-top:1px solid rgba(99,102,241,0.25);box-shadow:0 -4px 24px rgba(0,0,0,0.4);">
    <div style="display:flex;align-items:flex-start;gap:12px;">
      <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#7c3aed);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;">
        <svg width="22" height="22" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-weight:700;font-size:0.9rem;color:#e8eaf0;margin-bottom:4px;">Instale o Despesa Fácil</div>
        <div style="font-size:0.8rem;color:#b0b4cc;line-height:1.5;">
          Toque em
          <svg width="14" height="14" fill="none" stroke="#6366f1" stroke-width="2" viewBox="0 0 24 24" style="vertical-align:middle;margin:0 2px;"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          <strong style="color:#e8eaf0;">Compartilhar</strong> e depois em <strong style="color:#e8eaf0;">Adicionar à Tela de Início</strong>
        </div>
      </div>
      <button id="pwa-ios-dismiss-btn" style="padding:6px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.08);color:#8b8fa8;cursor:pointer;flex-shrink:0;">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div style="margin-top:10px;display:flex;align-items:center;gap:6px;padding:8px 12px;background:rgba(99,102,241,0.08);border-radius:8px;border:1px solid rgba(99,102,241,0.15);">
      <svg width="14" height="14" fill="none" stroke="#6366f1" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span style="font-size:0.72rem;color:#8b8fa8;">Funciona sem internet após instalado</span>
    </div>
  </div>
  <script>
    (function() {
      const dismissed = localStorage.getItem('pwa-banner-dismissed');
      if (dismissed) return;

      const ua = navigator.userAgent;
      const isIOS = /iphone|ipad|ipod/i.test(ua);
      const isInStandaloneMode = window.navigator.standalone === true;
      const isSafari = /safari/i.test(ua) && !/crios|fxios|chrome/i.test(ua);

      if (isIOS && !isInStandaloneMode && isSafari) {
        const iosBanner = document.getElementById('pwa-ios-banner');
        setTimeout(function() { iosBanner.style.display = 'block'; }, 3000);
        document.getElementById('pwa-ios-dismiss-btn').addEventListener('click', function() {
          iosBanner.style.display = 'none';
          localStorage.setItem('pwa-banner-dismissed', '1');
        });
        return;
      }

      var deferredPrompt = null;
      var banner = document.getElementById('pwa-banner');
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        deferredPrompt = e;
        banner.style.display = 'flex';
      });
      document.getElementById('pwa-install-btn').addEventListener('click', function() {
        banner.style.display = 'none';
        if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(function() { deferredPrompt = null; }); }
      });
      document.getElementById('pwa-dismiss-btn').addEventListener('click', function() {
        banner.style.display = 'none';
        localStorage.setItem('pwa-banner-dismissed', '1');
      });
      window.addEventListener('appinstalled', function() { banner.style.display = 'none'; });
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
