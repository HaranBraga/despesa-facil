services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    networks:
      - easypanel
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-INSERIR_SECRET_AQUI}
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://seu-dominio.com}
      APP_URL: ${APP_URL:-https://app.despesafacil.com.br}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    networks:
      - easypanel
    depends_on:
      - backend

networks:
  easypanel:
    external: true
