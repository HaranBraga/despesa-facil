version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: despesa-facil-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-despesa_facil}
      POSTGRES_USER: ${POSTGRES_USER:-despesa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-despesa123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-despesa} -d ${POSTGRES_DB:-despesa_facil}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: despesa-facil-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-despesa}:${POSTGRES_PASSWORD:-despesa123}@postgres:5432/${POSTGRES_DB:-despesa_facil}
      JWT_SECRET: ${JWT_SECRET:-despesa_facil_secret_super_seguro_2024}
      PORT: 3000
      NODE_ENV: development
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: despesa-facil-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
