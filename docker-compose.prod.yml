services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://postgres:fc86aef5168ac8513316@sistemas_despesa-facil-db:5432/sistemas?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-INSERIR_SECRET_AQUI}
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://despesafacil.azecode.cloud}
      DF_BASE_URL: ${DF_BASE_URL:-https://despesafacil.azecode.cloud}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
