services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-despesa_facil}
      POSTGRES_USER: ${POSTGRES_USER:-despesa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-despesa123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-despesa} -d ${POSTGRES_DB:-despesa_facil}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-despesa}:${POSTGRES_PASSWORD:-despesa123}@postgres:5432/${POSTGRES_DB:-despesa_facil}
      JWT_SECRET: ${JWT_SECRET:-INSERIR_SECRET_AQUI}
      PORT: 3000
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL:-https://seu-dominio.com}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  postgres_data:
